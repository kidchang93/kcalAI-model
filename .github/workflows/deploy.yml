name: Deploy FastAPI to NCP

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

#      - name: Install dependencies locally (for Actions)
#        run: |
#          python -m pip install --upgrade pip
#          pip install -r requirements.txt

      - name: Deploy to NCP Server
        uses: actions/checkout@v3

      - name: Create SSH Key
        env:
          SSH_USER: ${{secrets.NCP_SERVER_USER}}
          SSH_KNOWN_HOSTS: ${{secrets.NCP_SERVER_IP}}
          SSH_PEM_KEY: ${{secrets.NCP_SSH_KEY}}
        run: |
          echo "$SSH_PEM_KEY" >> $HOME/key.pem
          chmod 400 $HOME/key.pem
          ssh -i $HOME/key.pem -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_KNOWN_HOSTS} 'echo "테스트 성공"'