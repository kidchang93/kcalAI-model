name: Deploy FastAPI to NCP

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies locally (for Actions)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to NCP Server
        uses: actions/checkout@v3
      - name: Create SSH Key
        run: | # access key를 actions 내부 워크스페이스에 pem파일로 저장하고 권한을 확보
          echo "${{ secrets.NCP_SSH_KEY }}" > ~/private-key.pem
          chmod 600 ~/private-key.pem
      - name: Create SSH directory # .ssh 디렉토리 생성
        run: |
          mkdir -p ~/.ssh
      - name: Add known host # known host에 해당 키를 추가
        run: |
          ssh-keyscan ${{ secrets.NCP_SERVER_IP }} >> ~/.ssh/known_hosts
      - name: Copy files to remote server # github repo의 모든 파일을 target 경로에 복사함.
        run: |
          cd ${{ github.workspace }}
          scp -i ~/private-key.pem -r ./* ${{ secrets.NCP_SERVER_USER }}@${{ secrets.NCP_SERVER_IP }}:${{ secrets.PROJECT_PATH }}
          echo "Copied files to remote server"

      - name: Restart FastAPI server
        run: |
          ssh -i ~/private-key.pem ${{ secrets.NCP_SERVER_USER }}@${{ secrets.NCP_SERVER_IP }} 'bash -s' <<'ENDSSH'
            cd ${{ secrets.PROJECT_PATH }}
            pkill -f "uvicorn main:app" || true
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 &
          ENDSSH